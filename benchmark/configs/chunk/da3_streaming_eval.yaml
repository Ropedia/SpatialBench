# ============================================================
# DA3-Streaming evaluation config
# ============================================================

# ---- Model ----
model: da3_streaming
checkpoint: "depth-anything/DA3-GIANT-1.1"
device: cuda

# ---- Data ----
scene_index: benchmark/scene_indices/all_scenes.json
scene_id: null                  # null = no specific scene restriction

# ---- Scene filtering ----
tags: dense+waymo
max_scenes: null

# ---- Evaluation parameters ----
eval_metrics:
  - depth
  - pose
  - trajectory
  # - pointcloud

depth_alignment: median

# ---- Output ----
output_dir: results/chunk/da3_streaming
output: null

# ---- Visualization ----
visualize: False
vis_conf_percent: 20.0

# ---- DA3-Streaming inference parameters ----
chunk_size: 60
overlap: 30
ref_view_strategy: first
