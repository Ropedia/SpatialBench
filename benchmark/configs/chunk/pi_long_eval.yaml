# ============================================================
# Pi-Long evaluation config
# ============================================================

# ---- Model ----
model: pi_long
checkpoint: null                # null = auto-download from yyfz233/Pi3
device: cuda

# ---- Data ----
scene_index: benchmark/scene_indices/all_scenes.json
scene_id: null                  # null = no specific scene restriction

# ---- Scene filtering ----
tags: dense+waymo
max_scenes: null

# ---- Evaluation parameters ----
eval_metrics:
  - depth
  - pose
  - trajectory
  # - pointcloud

depth_alignment: median

# ---- Output ----
output_dir: results/chunk/pi_long
output: null

# ---- Visualization ----
visualize: False
vis_conf_percent: 20.0

# ---- Pi-Long inference parameters ----
chunk_size: 60
overlap: 30
