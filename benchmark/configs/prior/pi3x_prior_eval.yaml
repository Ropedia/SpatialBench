# ============================================================
# Pi3X with GT-prior injection — evaluation config
# ============================================================

# ---- Model ----
model: pi3x
checkpoint: null
device: cuda

# ---- Data ----
scene_index: benchmark/scene_indices/all_scenes.json
scene_id: null                  # null = no specific scene restriction

# ---- Scene filtering ----
tags: sparse+robotwin
max_scenes: null

# ---- Evaluation parameters ----
eval_metrics:
  - depth
  - pose
  # - trajectory
  # - pointcloud
depth_alignment: median

# ---- GT Prior injection ----
# Pi3X supports per-frame mask injection (partial=True).
# mask_add_depth, mask_add_ray, mask_add_pose control each frame.
use_gt_camera: true             # pose + intrinsic
use_gt_depth: true
gt_camera_ratio: 1.0
gt_depth_ratio: 1.0
gt_seed: 42

# ---- Output ----
output_dir: results/prior/pi3x_prior
output: null

# ---- Visualization ----
visualize: False
vis_conf_percent: 10.0
